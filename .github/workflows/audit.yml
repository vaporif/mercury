name: Audit

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".claude/**"
      - ".serena/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".claude/**"
      - ".serena/**"
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deny:
    name: Deny
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Deny
        run: nix develop --command cargo deny check
