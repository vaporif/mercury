name: E2E

on:
  push:
    branches: [main]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".claude/**"
      - ".serena/**"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - ".claude/**"
      - ".serena/**"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: e2e-build

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: foundry-rs/foundry-toolchain@v1

      - uses: oven-sh/setup-bun@v2

      - name: Install SP1 toolchain
        run: |
          curl -L https://sp1.succinct.xyz | bash
          ~/.sp1/bin/sp1up --version 5.2.4
          echo "$HOME/.sp1/bin" >> "$GITHUB_PATH"

      - uses: actions/cache@v4
        with:
          path: external/solidity-ibc-eureka/node_modules
          key: bun-${{ hashFiles('external/solidity-ibc-eureka/bun.lock') }}

      - name: Install Solidity dependencies
        run: bun install --frozen-lockfile
        working-directory: external/solidity-ibc-eureka

      - name: Build and archive tests
        run: cargo nextest archive --archive-file mercury-e2e.tar.zst --package mercury-e2e

      - uses: actions/upload-artifact@v4
        with:
          name: e2e-archive
          path: mercury-e2e.tar.zst

      - name: Generate matrix
        id: matrix
        run: |
          matrix=$(python3 .github/scripts/generate-e2e-matrix.py mercury-e2e.tar.zst e2e-matrix.toml)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  e2e-test:
    name: E2E / ${{ matrix.binary }} / ${{ matrix.test }}
    needs: build-and-generate
    if: needs.build-and-generate.outputs.matrix != '[]'
    runs-on: ubuntu-latest
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.build-and-generate.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - uses: actions/download-artifact@v4
        with:
          name: e2e-archive

      - uses: ./.github/actions/cosmos-setup
        if: contains(toJSON(matrix.setup), '"cosmos"')

      - uses: ./.github/actions/ethereum-setup
        if: contains(toJSON(matrix.setup), '"ethereum"')

      - name: Run test
        env:
          NEXTEST_PROFILE: ci
        run: |
          cargo nextest run \
            --archive-file mercury-e2e.tar.zst \
            --run-ignored all \
            -E 'binary(=${{ matrix.binary }}) & test(=${{ matrix.test }})'
