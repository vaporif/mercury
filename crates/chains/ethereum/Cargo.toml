[package]
name = "mercury-ethereum"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
publish = false

[lints]
workspace = true

[dependencies]
mercury-core = { workspace = true }
mercury-chain-traits = { workspace = true }

alloy = { workspace = true }

futures = { workspace = true }
async-trait = { workspace = true }
eyre = { workspace = true }
tracing = { workspace = true }
serde = { workspace = true }
url = { workspace = true }
zeroize = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
reqwest = { workspace = true }
base64 = { workspace = true }
ethereum-types = { workspace = true }
ethereum-apis = { workspace = true }
ethereum-light-client = { workspace = true }

# SP1 prover (optional, heavy deps)
sp1-ics07-tendermint-prover = { workspace = true, optional = true }
ibc-eureka-solidity-types = { workspace = true, optional = true }
sp1-sdk = { workspace = true, optional = true }
sp1-prover = { workspace = true, optional = true }
ibc-proto = { workspace = true, optional = true }
ibc-proto-eureka = { workspace = true, optional = true }
prost = { workspace = true, optional = true }
