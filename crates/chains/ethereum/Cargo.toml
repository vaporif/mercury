    "dep:sp1-ics07-tendermint-prover",
    "dep:ibc-eureka-solidity-types",
    "dep:sp1-sdk",
    "dep:sp1-prover",
    "dep:ibc-proto",
    "dep:ibc-proto-eureka",
    "dep:prost",
    "dep:sha2",
    "dep:hex",
    "dep:ibc-client-tendermint",
    "dep:ibc-core-commitment-types",
