[[profile.default.overrides]]
filter = "package(mercury-e2e)"
threads-required = 2
slow-timeout = { period = "120s", terminate-after = 3 }

# Ethereum e2e tests need more time for SP1 prover setup.
# Run with: cargo nextest run --profile eth-e2e ...
[profile.eth-e2e]

[[profile.eth-e2e.overrides]]
filter = "package(mercury-e2e)"
threads-required = 2

# CI profile — activated via NEXTEST_PROFILE=ci in GitHub Actions
[profile.ci]

[[profile.ci.overrides]]
filter = "package(mercury-e2e)"
threads-required = 2

[[profile.ci.overrides]]
filter = "binary(cosmos_ethereum)"
slow-timeout = { period = "1200s" }
